<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Campus Sakshar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(to right, #00b4d8, #0073e6);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 15px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      color: #b0b2b4;
      font-size: 1.8rem;
    }
    header nav a {
      text-decoration: none;
      color: #f3f4f4;
      font-weight: 600;
      margin: 0 10px;
    }
    header nav a:hover { color: #005bb5; }

    .form-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .form-box {
      background: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      width: 350px;
      text-align: center;
    }
    .form-box h2 {
      color: #0073e6;
      margin-bottom: 20px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0073e6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #eceef0;
    }
    .login-link {
      margin-top: 15px;
      font-size: 0.9rem;
    }
    .login-link a {
      color: #0073e6;
      text-decoration: none;
    }
    .login-link a:hover { text-decoration: underline; }

    /* Navbar */
    .navbar { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:rgba(230, 0, 192, 0.8); color:white; position:sticky; top:0; z-index:1000; }
    .navbar .logo { font-size:1.5rem; font-weight:bold; display:flex; align-items:center; gap:10px; }

    /* Logo Animation */
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .navbar .logo img { height:60px; width:60px; border-radius:10px; animation: pulse 4s infinite; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .navbar .logo img:hover { transform: scale(1.2) rotate(10deg); box-shadow: 0 0 20px #00aaff, 0 0 40px #00aaff; }

     /* Slideshow Background */
    .slideshow { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2; overflow:hidden; }
    .slideshow img { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; opacity:0; animation:fade 20s infinite; transform: translateY(0); transition: transform 0.2s ease-out; }
    .slideshow img:nth-child(1){ animation-delay:0s; }
    .slideshow img:nth-child(2){ animation-delay:5s; }
    .slideshow img:nth-child(3){ animation-delay:10s; }
    .slideshow img:nth-child(4){ animation-delay:15s; }
    @keyframes fade { 0% {opacity:0;} 10% {opacity:1;} 25% {opacity:1;} 35% {opacity:0;} 100% {opacity:0;} }

    .nav-links { display:flex; gap:20px; }
    .nav-links a { color:white; text-decoration:none; font-weight:500; }
    .nav-links a:hover { text-decoration:underline; }

/* Overlay for dark mode */
    .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0); z-index:-1; transition: background 0.3s; }
    body.dark .overlay { background:rgba(0,0,0,0.5); }

    /* Profile Section */
.profile {
  display:flex;
  align-items:center;
  gap:8px;
  margin-left:15px;
  cursor:pointer;
  color:white;
  font-weight:500;
}

.profile img {
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid white;
  transition:transform 0.3s ease, box-shadow 0.3s ease;
}

.profile img:hover {
  transform:scale(1.1);
  box-shadow:0 0 10px rgba(255,255,255,0.7);
}
.profile {
  position: relative;
}

.profile-menu {
  display: none;
  position: absolute;
  top: 50px;
  right: 0;
  background: white;
  color: #333;
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  min-width: 150px;
  overflow: hidden;
  z-index: 2000;
}

.profile-menu a {
  display: block;
  padding: 10px 15px;
  text-decoration: none;
  color: #333;
  font-size: 0.9rem;
  transition: background 0.3s;
}

.profile-menu a:hover {
  background: #f1f1f1;
}
/* Active dropdown */
.profile-menu.active {
  display: block;
}

 /* Hamburger */
    .hamburger { display:none; flex-direction:column; cursor:pointer; }
    .hamburger div { width:25px; height:3px; background:white; margin:4px; transition:0.3s; }

     /* Footer */
    footer { background:rgba(0,115,230,0.8); color:white; text-align:center; padding:20px; margin-top:40px; }
    .footer-links { margin:10px 0; display:flex; justify-content:center; gap:15px; flex-wrap:wrap; align-items:center; }
    .footer-links a { color:rgb(179, 37, 37); margin:0 10px; text-decoration:none; font-size:1.2rem; transition:all 0.3s ease; }
    .footer-links a:hover { transform:scale(1.2); }
    .footer-links .fa-facebook:hover { color:#1877f2; }
    .footer-links .fa-instagram:hover { color:#e1306c; }
    .footer-links .fa-twitter:hover { color:#1da1f2; }

 /* Floating Dark Mode Toggle */
    .dark-toggle { position:fixed; bottom: 20px; right:20px; background:#0073e6; color:white; border:none; width:50px;height:50px; border-radius:50%; cursor:pointer; font-size:1.3rem; box-shadow:0 4px 6px rgba(0,0,0,0.2); transition:all 0.3s ease; z-index:1100; display:flex;align-items: center; justify-content: center; }
    .dark-toggle:hover { transform:scale(1.1); background:#005bb5; }

     /* Responsive */
    @media(max-width:768px){
      .nav-links{ display:none; flex-direction:column; background:rgba(0,115,230,0.9); position:absolute; top:60px; right:0; width:200px; padding:15px; }
      .nav-links.active{ display:flex; }
      .hamburger{ display:flex; }
      .search-bar input{ width:70%; }
    }
    


  </style>
</head>
<body>

     <!-- Slideshow Background -->
  <div class="slideshow">
    <img src="https://img.freepik.com/premium-photo/set-blank-colorful-sticky-notes-business-people-meeting-use-post-it-notes-share-idea_661495-8112.jpg?semt=ais_hybrid&w=740&q=80" alt="Slide 1">
    <img src="https://img.freepik.com/premium-vector/back-school-doodle-style-background-education-hand-drawn-objects-symbols-banner_43029-1963.jpg" alt="Slide 2">
    <img src="https://t4.ftcdn.net/jpg/01/31/96/99/360_F_131969925_4npM7jqii8Dlo76mRROdD0r285Oojc8d.jpg" alt="Slide 3">
    <img src="https://img.freepik.com/premium-photo/contemporary-learning-workspace-featuring-laptop-textbooks-wireless-mouse-vibrant-blue-desk-generative-ai_262708-31025.jpg?semt=ais_hybrid&w=740&q=80" alt="Slide 4">
  </div>
  <!-- Overlay for dark mode -->
  <div class="overlay"></div>
  <header class="navbar">
     <div class="logo">
    <img src="logo.jpg" alt="Logo">
    Campus Sakshar</div>
     <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="view notes.html">View Notes</a>
    <a href="peer to peer exchange.html">Peer Exchange</a>
    <a href="about us.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
 <!-- Profile Section -->
<div class="profile" onclick="toggleProfileMenu()">
  <img src="images.png" alt="Profile">
  <span>My Profile</span>
  <!-- Dropdown Menu -->
  <div class="profile-menu">
    <a href="#">View Profile</a>
    <a href="setting.html">Settings</a>
  </div>
</div>

 <div class="hamburger" onclick="toggleMenu()">
    <div></div><div></div><div></div>
  </div>
</header>


  <div class="form-container">
    <div class="form-box">
      <h2>Create Account</h2>
      <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
      </form>
      <button onclick="registerUser()">Register</button>
      <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

 <!-- Footer -->
  <footer>
    <p>&copy; 2025 Campus Sakshar | Empowering Students through Knowledge Sharing</p>
    <div class="footer-links">
      <a href="mailto:info@campussakshar.com" title="Email"><i class="fa-solid fa-envelope"></i></a>
      <a href="https://facebook.com" target="_blank" title="Facebook"><i class="fab fa-facebook"></i></a>
      <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://twitter.com" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
    </div>
  </footer>

  <!-- Floating Dark Mode Button -->
  <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>

  <script>
    function toggleMenu(){ document.querySelector(".nav-links").classList.toggle("active"); }
    function toggleDarkMode(){
      document.body.classList.toggle("dark");
      const btn=document.querySelector(".dark-toggle");
      btn.textContent=document.body.classList.contains("dark")?"☀️":"🌙";
    }
     // Parallax scroll effect
    window.addEventListener('scroll', function() {
      const scrollY = window.scrollY;
      const images = document.querySelectorAll('.slideshow img');
      images.forEach((img) => {
        img.style.transform = `translateY(${scrollY * 0.3}px)`; // adjust 0.3 for speed
      });
    });
    function toggleProfileMenu() {
  document.querySelector(".profile-menu").classList.toggle("active");
}

// Close dropdown if clicked outside
window.addEventListener("click", function(e) {
  if (!e.target.closest(".profile")) {
    document.querySelector(".profile-menu").classList.remove("active");
  }
});


    async function registerUser() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const role = document.getElementById('role').value;

      try {
        const API_BASE = window.location.origin.includes(':5000') ? '' : 'http://127.0.0.1:5000';
        const res = await fetch(`${API_BASE}/api/users/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed');

        alert('Registration successful!');
        window.location.href = 'login.html';
      } catch (err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
